scenario_id: leo-radiometric-media
description: LEO two-way and three-way radiometric example with configured constant media range delays.
spacecraft:
  name: demo-sat
  mass_kg: 120.0
  area_m2: 2.5
  drag_coefficient: 2.2
  reflectivity_coefficient: 1.3
initial_state:
  epoch: "2026-01-01T00:00:00+00:00"
  time_scale: UTC
  frame: EME2000
  central_body: earth
  representation: cartesian
  cartesian:
    position_km: [7000.0, 0.0, 0.0]
    velocity_km_s: [0.0, 7.5, 1.0]
force_model:
  gravity: two_body
propagation:
  duration_s: 600.0
  step_s: 60.0
ground_stations:
  - name: uplink-eci
    position_eci_km: [6378.1363, 0.0, 0.0]
    frame: EME2000
    elevation_mask_deg: 0.0
  - name: downlink-eci
    position_eci_km: [0.0, 6378.1363, 0.0]
    frame: EME2000
    elevation_mask_deg: 0.0
measurements:
  types: [two_way_range, two_way_range_rate, three_way_range, three_way_range_rate]
  cadence_s: 60.0
  radiometric_media_uplink_delay_km: 0.002
  radiometric_media_downlink_delay_km: 0.003
  radiometric_media_source: configured-example
  noise:
    range_sigma_km: 0.01
    range_rate_sigma_km_s: 0.00001
    seed: 42
