scenario_id: leo-geodetic-eop-topocentric
description: Deterministic LEO local-horizon angle example using WGS-84 geodetic stations and explicit Earth-orientation corrections.
spacecraft:
  name: demo-sat
  mass_kg: 120.0
  area_m2: 2.5
  drag_coefficient: 2.2
  reflectivity_coefficient: 1.3
initial_state:
  epoch: "2026-01-01T00:00:00+00:00"
  time_scale: UTC
  frame: EME2000
  central_body: earth
  representation: cartesian
  cartesian:
    position_km: [7000.0, 0.0, 0.0]
    velocity_km_s: [0.0, 7.5, 1.0]
force_model:
  gravity: two_body
propagation:
  duration_s: 600.0
  step_s: 60.0
earth_orientation:
  ut1_minus_utc_s: 0.12
  polar_motion_x_arcsec: 0.08
  polar_motion_y_arcsec: -0.14
  source: example-fixed-eop
ground_stations:
  - name: greenwich-geodetic
    latitude_deg: 0.0
    longitude_deg: 0.0
    altitude_km: 0.0
    frame: EME2000
    elevation_mask_deg: 0.0
  - name: east-geodetic
    latitude_deg: 0.0
    longitude_deg: 90.0
    altitude_km: 0.0
    frame: EME2000
    elevation_mask_deg: 0.0
measurements:
  types: [azimuth, elevation]
  cadence_s: 60.0
  noise:
    angle_sigma_deg: 0.001
    seed: 42
