scenario_id: leo-finite-burn
description: Deterministic LEO local propagation example with a finite trim burn.
spacecraft:
  name: demo-sat
  mass_kg: 120.0
  area_m2: 2.5
  drag_coefficient: 2.2
  reflectivity_coefficient: 1.3
initial_state:
  epoch: "2026-01-01T00:00:00+00:00"
  time_scale: UTC
  frame: EME2000
  central_body: earth
  representation: cartesian
  cartesian:
    position_km: [7000.0, 0.0, 0.0]
    velocity_km_s: [0.0, 7.5, 1.0]
force_model:
  gravity: two_body
propagation:
  duration_s: 600.0
  step_s: 60.0
maneuvers:
  - name: finite-trim
    epoch: "2026-01-01T00:01:00+00:00"
    frame: EME2000
    delta_v_km_s: [0.0, 0.06, 0.0]
    duration_s: 120.0
ground_stations:
  - name: equator-eci
    position_eci_km: [6378.1363, 0.0, 0.0]
    frame: EME2000
    elevation_mask_deg: 0.0
measurements:
  types: [range, range_rate]
  cadence_s: 60.0
  noise:
    range_sigma_km: 0.01
    range_rate_sigma_km_s: 0.00001
    seed: 42
