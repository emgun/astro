name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: python -m pip install -e '.[dev]'

      - name: Lint
        run: python -m ruff check .

      - name: Type check
        run: python -m mypy

      - name: Test
        run: python -m pytest -q
